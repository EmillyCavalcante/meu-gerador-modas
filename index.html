<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provador Virtual da Emilly</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Layout principal dividindo a tela em colunas */
        .interface-provador {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Painéis de botões laterais */
        .painel-botoes {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 130px;
        }

        /* Estilo dos botões de categoria */
        .btn-categoria {
            background-color: #e0e0e0;
            color: #333;
            border: none;
            padding: 12px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        /* Cor de quando a categoria está selecionada para edição */
        .btn-categoria.ativo {
            background-color: #ff8da1;
            color: white;
            box-shadow: 0 4px 12px rgba(255, 141, 161, 0.3);
        }

        /* Estilo das setas redondas de passar/voltar */
        .btn-seta {
            background-color: #ff8da1;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-seta:hover {
            background-color: #e06c82;
        }

        /* O container da foto */
        .container-camadas {
            position: relative;
            width: 400px;  
            height: 600px; 
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Camadas de imagem empilhadas */
        .camada {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="interface-provador">
        
        <div class="painel-botoes">
            <button id="btn-cat-top" class="btn-categoria ativo" onclick="selecionarCategoria('top')">Top</button>
            <button id="btn-cat-vestido" class="btn-categoria" onclick="selecionarCategoria('vestido')">Vestido</button>
            <button id="btn-cat-blusa" class="btn-categoria" onclick="selecionarCategoria('blusa')">Blusa</button>
        </div>

        <button class="btn-seta" onclick="acionarSeta(-1)">⬅</button>

        <div class="container-camadas">
            <img src="base.png" class="camada" alt="Modelo Base">

            <img id="camada-sapato" src="sapato0.png" class="camada" alt="Sapato">
            <img id="camada-saia" src="saia0.png" class="camada" alt="Saia">
            <img id="camada-calca" src="calca0.png" class="camada" alt="Calca">
            <img id="camada-vestido" src="vestido0.png" class="camada" alt="Vestido">
            <img id="camada-top" src="top0.png" class="camada" alt="Top">
            <img id="camada-blusa" src="blusa0.png" class="camada" alt="Blusa">
        </div>

        <button class="btn-seta" onclick="acionarSeta(1)">➡</button>

        <div class="painel-botoes">
            <button id="btn-cat-calca" class="btn-categoria" onclick="selecionarCategoria('calca')">Calça</button>
            <button id="btn-cat-saia" class="btn-categoria" onclick="selecionarCategoria('saia')">Saia</button>
            <button id="btn-cat-sapato" class="btn-categoria" onclick="selecionarCategoria('sapato')">Sapato</button>
        </div>

    </div>

    <script>
        // Começa controlando o 'top' por padrão
        let categoriaAtiva = 'top';

        // Todos os índices iniciando em 0 (suas imagens base limpas)
        const indices = {
            top: 0,
            vestido: 0,
            blusa: 0,
            calca: 0,
            saia: 0,
            sapato: 0
        };

        // AJUSTE AQUI: coloque a quantidade máxima de itens que você tem de cada um no GitHub
        const limitesMaximos = {
            top: 9,
            vestido: 5,   // Exemplo: se tiver vestido1 até vestido5
            blusa: 4,
            calca: 4,
            saia: 5,      // Exemplo: se tiver saia1 até saia5
            sapato: 8
        };

        // Troca qual categoria as setas redondas vão comandar
        function selecionarCategoria(novaCategoria) {
            // Apaga o destaque do botão antigo
            document.getElementById(`btn-cat-${categoriaAtiva}`).classList.remove('ativo');
            
            // Atribui a nova categoria ativa
            categoriaAtiva = novaCategoria;
            
            // Acende o destaque no botão novo
            document.getElementById(`btn-cat-${categoriaAtiva}`).classList.add('ativo');
        }

        // Responde ao clique das setas redondas laterais
        function acionarSeta(direcao) {
            mudarRoupa(categoriaAtiva, direcao);
        }

        // Faz o cálculo matemático e atualiza a imagem correspondente
        function mudarRoupa(categoria, direcao) {
            const limiteDaCategoria = limitesMaximos[categoria];

            indices[categoria] += direcao;

            if (indices[categoria] < 0) {
                indices[categoria] = limiteDaCategoria;
            }
            if (indices[categoria] > limiteDaCategoria) {
                indices[categoria] = 0;
            }

            const imagemCamada = document.getElementById(`camada-${categoria}`);
            imagemCamada.src = `${categoria}${indices[categoria]}.png`;
        }
    </script>

</body>
</html>
