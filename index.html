<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provador Virtual da Emilly</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Layout principal dividindo a tela em 3 colunas */
        .interface-provador {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        /* Painel de botões laterais */
        .painel-botoes {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Estilo dos botões */
        .btn-controle {
            background-color: #ff8da1;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 140px;
        }

        .btn-controle:hover {
            background-color: #e06c82;
        }

        /* O container ajustado para a sua foto */
        .container-camadas {
            position: relative;
            width: 400px;  
            height: 600px; 
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Camadas de imagem empilhadas */
        .camada {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="interface-provador">
        
        <div class="painel-botoes">
            <button class="btn-controle" onclick="mudarRoupa('top', -1)">⬅ Voltar Top</button>
            <button class="btn-controle" onclick="mudarRoupa('calca', -1)">⬅ Voltar Calça</button>
            <button class="btn-controle" onclick="mudarRoupa('sapato', -1)">⬅ Voltar Sapato</button>
            <button class="btn-controle" onclick="mudarRoupa('blusa', -1)">⬅ Voltar Blusa</button>
        </div>

        <div class="container-camadas">
            <img src="base.png" class="camada" alt="Modelo Base">

            <img id="camada-sapato" src="sapato1.png" class="camada" alt="Sapato">
            
            <img id="camada-calca" src="calca1.png" class="camada" alt="Calca">
            
            <img id="camada-top" src="top1.png" class="camada" alt="Top">

            <img id="camada-blusa" src="blusa1.png" class="camada" alt="Blusa">
        </div>

        <div class="painel-botoes">
            <button class="btn-controle" onclick="mudarRoupa('top', 1)">Avançar Top ➡</button>
            <button class="btn-controle" onclick="mudarRoupa('calca', 1)">Avançar Calça ➡</button>
            <button class="btn-controle" onclick="mudarRoupa('sapato', 1)">Avançar Sapato ➡</button>
            <button class="btn-controle" onclick="mudarRoupa('blusa', 1)">Avançar Blusa ➡</button>
        </div>

    </div>

    <script>
        // Guardamos em qual número de roupa cada categoria está começando
        const indices = {
            blusa: 0,
            top: 0,
            calca: 0,
            sapato: 0
        };

        // ALTERE AQUI: quantidade real de itens que você tem de cada um no GitHub
        const limitesMaximos = {
            blusa: 2,   // Ex: blusa1 até blusa5
            top: 5,     // Ex: top1 até top8
            calca: 3,    // Ex: calca1 até calca6
            sapato: 2  // Ex: sapato1 até sapato4
        };

        function mudarRoupa(categoria, direcao) {
            // Pega o limite máximo específico desta categoria
            const limiteDaCategoria = limitesMaximos[categoria];

            // Atualiza o número atual somando 1 ou -1
            indices[categoria] += direcao;

            // Se voltar antes do 1, vai para o limite máximo daquela categoria
            if (indices[categoria] < 0) {
                indices[categoria] = limiteDaCategoria;
            }
            // Se passar do limite máximo, volta para o 1
            if (indices[categoria] > limiteDaCategoria) {
                indices[categoria] = 0;
            }

            // Encontra a imagem na tela e altera o link do arquivo correspondente
            const imagemCamada = document.getElementById(`camada-${categoria}`);
            imagemCamada.src = `${categoria}${indices[categoria]}.png`;
        }
    </script>

</body>
</html>
