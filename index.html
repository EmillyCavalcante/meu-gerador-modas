<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provador Virtual da Emilly</title>
    <style>
        body {
            display: flex;
            flex-direction: column; /* Alinha o menu e o provador verticalmente */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
            font-family: Arial, sans-serif;
            gap: 30px;
        }

        /* Menu superior para escolher a categoria */
        .menu-categorias {
            display: flex;
            gap: 15px;
        }

        .btn-categoria {
            background-color: #e0e0e0;
            color: #333;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* Cor de quando a categoria está selecionada */
        .btn-categoria.ativo {
            background-color: #ff8da1;
            color: white;
            box-shadow: 0 4px 12px rgba(255, 141, 161, 0.4);
        }

        /* Layout do provador (Setas + Foto) */
        .interface-provador {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        /* Estilo das setas de passar/voltar */
        .btn-seta {
            background-color: #ff8da1;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50%; /* Deixa o botão redondo */
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-seta:hover {
            background-color: #e06c82;
        }

        /* O container da foto */
        .container-camadas {
            position: relative;
            width: 400px;  
            height: 600px; 
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Camadas de imagem empilhadas */
        .camada {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="menu-categorias">
        <button id="btn-cat-top" class="btn-categoria ativo" onclick="selecionarCategoria('top')">Tops</button>
        <button id="btn-cat-calca" class="btn-categoria" onclick="selecionarCategoria('calca')">Calças</button>
        <button id="btn-cat-sapato" class="btn-categoria" onclick="selecionarCategoria('sapato')">Sapatos</button>
        <button id="btn-cat-blusa" class="btn-categoria" onclick="selecionarCategoria('blusa')">Blusas</button>
    </div>

    <div class="interface-provador">
        
        <button class="btn-seta" onclick="acionarSeta(-1)">⬅</button>

        <div class="container-camadas">
            <img src="base.png" class="camada" alt="Modelo Base">

            <img id="camada-sapato" src="sapato0.png" class="camada" alt="Sapato">
            <img id="camada-top" src="top0.png" class="camada" alt="Top">
            <img id="camada-calca" src="calca0.png" class="camada" alt="Calca">
            <img id="camada-blusa" src="blusa0.png" class="camada" alt="Blusa">
        </div>

        <button class="btn-seta" onclick="acionarSeta(1)">➡</button>

    </div>

    <script>
        // Começamos controlando a categoria 'top' por padrão
        let categoriaAtiva = 'top';

        // O histórico de índices que você já configurou
        const indices = {
            blusa: 0,
            top: 0,
            calca: 0,
            sapato: 0
        };

        // Seus limites máximos exatos
        const limitesMaximos = {
            blusa: 4,
            top: 9,
            calca: 4,
            sapato: 8
        };

        // Função para mudar qual categoria as setas vão controlar
        function selecionarCategoria(novaCategoria) {
            // Remove a cor de destaque do botão antigo
            document.getElementById(`btn-cat-${categoriaAtiva}`).classList.remove('ativo');
            
            // Define a nova categoria como a dona das setas
            categoriaAtiva = novaCategoria;
            
            // Adiciona a cor de destaque no novo botão clicado
            document.getElementById(`btn-cat-${categoriaAtiva}`).classList.add('ativo');
        }

        // Função que as duas setas redondas chamam
        function acionarSeta(direcao) {
            // Executa a troca passando a categoria selecionada no momento
            mudarRoupa(categoriaAtiva, direcao);
        }

        // A sua função principal de cálculo, agora acionada dinamicamente
        function mudarRoupa(categoria, direcao) {
            const limiteDaCategoria = limitesMaximos[categoria];

            indices[categoria] += direcao;

            if (indices[categoria] < 0) {
                indices[categoria] = limiteDaCategoria;
            }
            if (indices[categoria] > limiteDaCategoria) {
                indices[categoria] = 0;
            }

            const imagemCamada = document.getElementById(`camada-${categoria}`);
            imagemCamada.src = `${categoria}${indices[categoria]}.png`;
        }
    </script>

</body>
</html>
